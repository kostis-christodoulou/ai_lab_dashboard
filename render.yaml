services:
  - type: web
    name: ai-lab-dashboard
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: UV_VERSION
        value: "0.8.15"
      - key: MOTHERDUCK_DB
        value: ai_lab_dashboard
      - key: MOTHERDUCK_TOKEN
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_REDIRECT_URI
        sync: false
      - key: ALLOWED_LOGIN_EMAILS
        value: kchristodoulou@london.edu
